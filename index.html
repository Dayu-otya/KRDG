<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クルドゥガ - 日本ナウル協会公式ルール準拠</title>
    <style>
        body {
            font-family: 'Hiragino Sans','Meiryo',sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px;
            min-height: 100vh;
        }
        h2 { margin: 0 0 2px; letter-spacing: 2px; }
        .sub-title { color: #888; font-size: 11px; margin-bottom: 8px; }
        .score-container { display: flex; gap: 10px; margin-bottom: 8px; width: 100%; max-width: 760px; }
        .score-box { flex: 1; border-radius: 8px; padding: 5px 12px; text-align: center; }
        .team-a-box { background: #dbeafe; color: #1d4ed8; }
        .team-b-box { background: #fef3c7; color: #b45309; }
        .score-val { font-size: 22px; font-weight: bold; }
        .score-val span { font-size: 11px; }
        .round-info { font-size: 10px; opacity: 0.8; }
        .status-text { font-size: 12px; color: #aaa; margin-bottom: 6px; height: 18px; }
        .canvas-wrapper { position: relative; width: 100%; max-width: 760px; }
        canvas {
            display: block; width: 100%; border-radius: 12px;
            background: #e8f0e0; box-shadow: 0 4px 20px #0009;
            touch-action: none; cursor: crosshair;
        }
        .overlay {
            position: absolute; inset: 0; display: none;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5); border-radius: 12px;
            flex-direction: column;
        }
        .result-toast {
            position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
            color: #fff; border-radius: 8px; padding: 5px 18px;
            font-size: 13px; font-weight: bold; pointer-events: none; display: none;
        }
        .btn {
            padding: 12px 28px; border: none; border-radius: 10px;
            font-size: 15px; font-weight: bold; cursor: pointer; color: #fff;
        }
        .btn-next { background: #7c3aed; }
        .btn-restart { background: #f59e0b; color: #000; }
        .log-area {
            width: 100%; max-width: 760px; mt: 8px; background: #111;
            border-radius: 10px; padding: 7px 12px; height: 100px;
            overflow-y: auto; font-size: 11px; color: #ccc; margin-top: 10px;
        }
    </style>
</head>
<body>

<h2>クルドゥガ</h2>
<p class="sub-title">日本ナウル協会 公式ルール準拠</p>

<div class="score-container">
    <div class="score-box team-a-box">
        <div style="font-weight:bold; font-size:12px;">チームA</div>
        <div class="score-val" id="score-a">0<span>点</span></div>
        <div class="round-info" id="rounds-a"></div>
    </div>
    <div class="score-box team-b-box">
        <div style="font-weight:bold; font-size:12px;">チームB</div>
        <div class="score-val" id="score-b">0<span>点</span></div>
        <div class="round-info" id="rounds-b"></div>
    </div>
</div>

<div class="status-text" id="status">準備中...</div>

<div class="canvas-wrapper">
    <canvas id="gameCanvas" width="760" height="420"></canvas>
    <div id="resultToast" class="result-toast"></div>
    <div id="overlay" class="overlay"></div>
</div>

<div class="log-area" id="log">
    <div style="color:#444; font-size:10px;">投擲ログ</div>
</div>

<script>
// --- 定数・設定 ---
const ROUNDS_MAX = 5;
const PLAYERS = 3;
const CW = 760; const CH = 420;
const THROW_X = 80;
const FIELD_TOP = 60; const FIELD_BOT = CH - 60;
const FIELD_MID = (FIELD_TOP + FIELD_BOT) / 2;
const PLAYER_SPACING = 60;
const LOG_CX = 340; const LOG_W = 52; const LOG_RY = 26;
const LOG_TOP = FIELD_TOP + 30; const LOG_BOT = FIELD_BOT - 30;
const ZONE_X = LOG_CX + LOG_W / 2 + 20;
const ZONE_RIGHT = CW - 30;
const ZONE_W = (ZONE_RIGHT - ZONE_X) / 3;
const ZONE_TOP_Y = LOG_TOP + LOG_RY;
const ZONE_BOT_Y = LOG_BOT - LOG_RY;
const ZONE_H = ZONE_BOT_Y - ZONE_TOP_Y;
const DRAG_MAX = 120; const GRAVITY = 900; const DT = 0.004;
const TEAM_COLOR = ["#1d4ed8","#b45309"];
const TEAM_NAME = ["チームA","チームB"];
const ZONE_DEFS = [
    { label:"1pt", pts:1, color:"#fde047", tc:"#713f12" },
    { label:"2pt", pts:2, color:"#fb923c", tc:"#7c2d12" },
    { label:"3pt", pts:3, color:"#f87171", tc:"#7f1d1d" }
];

// --- ゲーム状態 ---
let g = {};
let drag = null;
let anim = null;
let throwing = false;

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function initGame() {
    g = {
        round: 1, phase: "throwing", turn: 0, playerIdx: 0,
        scores: [Array(ROUNDS_MAX).fill(0), Array(ROUNDS_MAX).fill(0)],
        roundMarkers: [], log: [], maxRounds: ROUNDS_MAX
    };
    updateUI();
    draw();
}

function playerY(idx) { return FIELD_MID + (idx - 1) * PLAYER_SPACING; }

function dragToVelocity(dx, dy) {
    const len = Math.sqrt(dx*dx + dy*dy);
    const power = Math.min(len / DRAG_MAX, 1.0);
    const minVx = (LOG_CX - LOG_W/2 - THROW_X) / (80 * DT);
    const speed = minVx / 0.1 * power;
    return { vx: -dx/len*speed, vy: -dy/len*speed, power };
}

function simTraj(x0, y0, vx0, vy0, steps=140) {
    const pts = [];
    let x=x0, y=y0, vx=vx0, vy=vy0;
    for (let i=0; i<steps; i++) {
        pts.push({x,y,vx,vy});
        vy += GRAVITY * DT; x += vx * DT; y += vy * DT;
        if (x > CW+60 || x < -60 || y > CH+60) break;
    }
    return pts;
}

function checkLog(pts) {
    const left = LOG_CX - LOG_W/2;
    for (let i=0; i<pts.length-1; i++) {
        const p=pts[i], q=pts[i+1];
        if (p.x <= left && q.x >= left) {
            const t = (left - p.x) / ((q.x-p.x)||0.001);
            const hy = p.y + t*(q.y-p.y);
            if (hy >= LOG_TOP && hy <= LOG_BOT) {
                return { hit:true, hx:left, hy, idx:i, vx: p.vx+(q.vx-p.vx)*t, vy: p.vy+(q.vy-p.vy)*t };
            }
        }
    }
    return { hit:false };
}

function bounceFromLog(hx, hy, inVx, inVy) {
    const angle = Math.atan2(Math.abs(inVy), Math.abs(inVx));
    const goRight = angle < Math.PI / 3.5;
    const speed = Math.sqrt(inVx*inVx + inVy*inVy);
    const reducedSpeed = speed * (0.2 + Math.random()*0.15);
    const bvx = goRight ? reducedSpeed * (0.6 + Math.random()*0.3) : -reducedSpeed * (0.5 + Math.random()*0.3);
    const bvy = -reducedSpeed * (0.3 + Math.random()*0.4);
    const floorY = FIELD_BOT - 10;
    const pts = [];
    let x = hx + (bvx > 0 ? 3 : -3), y = hy, vx = bvx, vy = bvy;
    for (let i=0; i<200; i++) {
        pts.push({x, y, vx, vy});
        vy += GRAVITY * DT; x += vx * DT; y += vy * DT;
        if (y >= floorY) {
            y = floorY; vy = -vy * 0.35; vx = vx * 0.6;
            if (Math.abs(vy) < 30 && Math.abs(vx) < 20) { pts.push({x, y:floorY, vx:0, vy:0}); break; }
        }
        if (x > CW+60 || x < -60) break;
    }
    return pts;
}

function judgeLanding(pts) {
    const last = pts[pts.length-1];
    if (last.y < ZONE_TOP_Y || last.y > ZONE_BOT_Y) return { inZone:false };
    for (let i=0; i<ZONE_DEFS.length; i++) {
        const zx = ZONE_X + i*ZONE_W;
        if (last.x >= zx && last.x <= zx+ZONE_W) return { inZone:true, zone:ZONE_DEFS[i], zoneIdx:i, lx:last.x, ly:last.y };
    }
    return { inZone:false };
}

// --- 描画系 ---
function draw() {
    ctx.clearRect(0,0,CW,CH);
    ctx.fillStyle="#e8f0e0"; ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle="#d4c890";
    ctx.beginPath(); ctx.roundRect(30,FIELD_TOP,CW-60,FIELD_BOT-FIELD_TOP,12); ctx.fill();
    ctx.strokeStyle="#b0a060"; ctx.lineWidth=2; ctx.stroke();

    ZONE_DEFS.forEach((z,i)=>{
        const zx=ZONE_X+i*ZONE_W;
        ctx.fillStyle=z.color; ctx.fillRect(zx, ZONE_TOP_Y, ZONE_W, ZONE_H);
        ctx.strokeStyle="#99000055"; ctx.strokeRect(zx, ZONE_TOP_Y, ZONE_W, ZONE_H);
        ctx.fillStyle=z.tc; ctx.font="bold 14px sans-serif"; ctx.textAlign="center";
        ctx.fillText(z.label, zx+ZONE_W/2, ZONE_BOT_Y+18);
    });

    // 丸太描画
    const logLeft = LOG_CX - LOG_W/2; const logRight = LOG_CX + LOG_W/2;
    const rxRef = LOG_W/2; const ryRef = LOG_RY * 0.6;
    ctx.save();
    const logGrad=ctx.createLinearGradient(logLeft,0,logRight,0);
    logGrad.addColorStop(0,"#3d1a06"); logGrad.addColorStop(0.5,"#8b4513"); logGrad.addColorStop(1,"#5a2d0c");
    ctx.fillStyle=logGrad;
    ctx.beginPath();
    ctx.moveTo(logLeft, LOG_TOP+LOG_RY); ctx.lineTo(logLeft, LOG_BOT-LOG_RY);
    ctx.ellipse(LOG_CX, LOG_BOT-LOG_RY, rxRef, ryRef, 0, Math.PI, 0, true);
    ctx.lineTo(logRight, LOG_TOP+LOG_RY);
    ctx.ellipse(LOG_CX, LOG_TOP+LOG_RY, rxRef, ryRef, 0, 0, Math.PI, false);
    ctx.fill();
    ctx.restore();

    // マーカー
    g.roundMarkers.forEach((m,i)=>{
        const zx=ZONE_X+m.zoneIdx*ZONE_W;
        const mx=zx+ZONE_W/2+(i%2===0?-10:10);
        ctx.beginPath(); ctx.arc(mx,m.ly,9,0,Math.PI*2);
        ctx.fillStyle=TEAM_COLOR[m.team]; ctx.fill();
        ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke();
    });

    // アニメーション中の棒
    if(anim){
        const p = anim.pts[anim.idx];
        const p2 = anim.pts[Math.min(anim.idx+1, anim.pts.length-1)];
        const angle = Math.atan2(p2.y-p.y, p2.x-p.x);
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(angle);
        ctx.fillStyle="#5D4037"; ctx.fillRect(-22,-4,44,8);
        ctx.restore();
    }

    // ドラッグ予測線
    if(drag && !throwing){
        const {ox,oy,cx,cy}=drag;
        const ddx=cx-ox, ddy=cy-oy;
        const len=Math.sqrt(ddx*ddx+ddy*ddy);
        if(len>4){
            const clamp=Math.min(len,DRAG_MAX);
            const {vx,vy}=dragToVelocity(ddx,ddy);
            const pts=simTraj(ox,oy,vx,vy);
            ctx.strokeStyle=TEAM_COLOR[g.turn]+"bb"; ctx.lineWidth=2; ctx.setLineDash([7,5]);
            ctx.beginPath();
            pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
            ctx.stroke(); ctx.setLineDash([]);
        }
    }

    // プレイヤー表示
    if(g.phase==="throwing" && !throwing){
        [0,1,2].forEach(i=>{
            const py=playerY(i);
            const isActive=i===g.playerIdx;
            ctx.beginPath(); ctx.arc(THROW_X, py, isActive?20:14, 0, Math.PI*2);
            ctx.fillStyle=isActive?TEAM_COLOR[g.turn]+"55":"#ccc4"; ctx.fill();
            ctx.strokeStyle=isActive?TEAM_COLOR[g.turn]:"#bbb"; ctx.stroke();
            ctx.fillStyle=isActive?TEAM_COLOR[g.turn]:"#888"; ctx.font="10px sans-serif";
            ctx.textAlign="center"; ctx.fillText(`P${i+1}`, THROW_X, py+4);
        });
    }
}

function updateUI() {
    const total = t => g.scores[t].reduce((a,b)=>a+b,0);
    document.getElementById("score-a").innerHTML = `${total(0)}<span>点</span>`;
    document.getElementById("score-b").innerHTML = `${total(1)}<span>点</span>`;
    
    document.getElementById("rounds-a").innerText = g.scores[0].map((s,i)=>`R${i+1}:${s}`).join(" ");
    document.getElementById("rounds-b").innerText = g.scores[1].map((s,i)=>`R${i+1}:${s}`).join(" ");

    const statusEl = document.getElementById("status");
    if(g.phase==="throwing") statusEl.innerHTML = `R${g.round} — <span style="color:${TEAM_COLOR[g.turn]}; font-weight:bold">${TEAM_NAME[g.turn]} P${g.playerIdx+1} の番</span>`;
    else if(g.phase==="roundEnd") statusEl.innerHTML = `<span style="color:#f59e0b">ラウンド終了 — 交代してください</span>`;
    else statusEl.innerHTML = `<span style="color:#f87171; font-weight:bold">ゲーム終了</span>`;

    const overlay = document.getElementById("overlay");
    overlay.style.display = (g.phase==="roundEnd" || g.phase==="gameEnd") ? "flex" : "none";
    if(g.phase==="roundEnd") overlay.innerHTML = `<button class="btn btn-next" onclick="nextRound()">次のラウンドへ ▶</button>`;
    if(g.phase==="gameEnd") {
        const winText = total(0)>total(1)? "チームAの勝利！" : total(1)>total(0)? "チームBの勝利！" : "引き分け";
        overlay.innerHTML = `<div style="font-size:22px; color:#fbbf24; margin-bottom:10px">${winText}</div><button class="btn btn-restart" onclick="initGame()">もう一度</button>`;
    }
}

function addLog(msg, color) {
    const logArea = document.getElementById("log");
    const div = document.createElement("div");
    div.style.color = color;
    div.innerText = msg;
    logArea.appendChild(div);
    logArea.scrollTop = logArea.scrollHeight;
}

// --- イベント制御 ---
canvas.addEventListener("mousedown", onDown);
window.addEventListener("mousemove", onMove);
window.addEventListener("mouseup", onUp);
canvas.addEventListener("touchstart", onDown, {passive:false});
window.addEventListener("touchmove", onMove, {passive:false});
window.addEventListener("touchend", onUp);

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const sx = CW/rect.width, sy = CH/rect.height;
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - rect.left)*sx, y: (src.clientY - rect.top)*sy };
}

function onDown(e) {
    if(throwing || g.phase!=="throwing") return;
    const {x,y} = getPos(e);
    if(Math.sqrt((x-THROW_X)**2 + (y-playerY(g.playerIdx))**2) > 40) return;
    drag = { ox: THROW_X, oy: playerY(g.playerIdx), cx: x, cy: y };
    if(e.cancelable) e.preventDefault();
}

function onMove(e) {
    if(!drag) return;
    const {x,y} = getPos(e);
    drag.cx = x; drag.cy = y;
    draw();
    if(e.cancelable) e.preventDefault();
}

function onUp(e) {
    if(!drag || throwing) return;
    const {ox,oy,cx,cy} = drag;
    const dx=cx-ox, dy=cy-oy;
    drag = null;
    const {vx,vy,power} = dragToVelocity(dx,dy);
    if(power < 0.05) { draw(); return; }

    throwing = true;
    const flyPts = simTraj(ox,oy,vx,vy,140);
    const col = checkLog(flyPts);
    let result, fullPts;

    if(!col.hit) {
        result = { hitMarutai:false, pts:0, inZone:false };
        fullPts = flyPts;
    } else {
        const bouncePts = bounceFromLog(col.hx, col.hy, col.vx, col.vy);
        const landing = judgeLanding(bouncePts);
        result = landing.inZone ? { hitMarutai:true, pts:landing.zone.pts, lx:landing.lx, ly:landing.ly, zoneIdx:landing.zoneIdx, inZone:true } : { hitMarutai:true, pts:0, inZone:false };
        fullPts = [...flyPts.slice(0, col.idx+1), ...bouncePts];
    }

    let idx = 0;
    function tick() {
        idx += 2;
        if(idx >= fullPts.length) {
            anim = null;
            finishThrow(result);
            return;
        }
        anim = { pts: fullPts, idx };
        draw();
        requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
}

function finishThrow(res) {
    const team = g.turn; const pIdx = g.playerIdx;
    let logMsg = `R${g.round} ${TEAM_NAME[team]} P${pIdx+1}: ` + (res.hitMarutai ? (res.inZone ? `命中 ${res.pts}点` : "命中 ゾーン外") : "外れ");
    addLog(logMsg, TEAM_COLOR[team]);

    if(res.inZone) g.roundMarkers.push({ team, pts:res.pts, ly:res.ly, zoneIdx:res.zoneIdx });

    if(team===0 && pIdx < PLAYERS-1) { g.playerIdx++; }
    else if(team===0) { g.turn=1; g.playerIdx=0; }
    else if(team===1 && pIdx < PLAYERS-1) { g.playerIdx++; }
    else {
        const aS = g.roundMarkers.filter(m=>m.team===0).reduce((s,m)=>s+m.pts, 0);
        const bS = g.roundMarkers.filter(m=>m.team===1).reduce((s,m)=>s+m.pts, 0);
        g.scores[0][g.round-1] = aS; g.scores[1][g.round-1] = bS;
        addLog(`── R${g.round}終了 A:${aS} / B:${bS} ──`, "#f59e0b");
        
        if(g.round >= g.maxRounds && aS !== bS) g.phase = "gameEnd";
        else { g.phase = "roundEnd"; g.round++; }
    }
    throwing = false;
    updateUI();
    draw();
}

function nextRound() {
    g.phase = "throwing"; g.turn = 0; g.playerIdx = 0; g.roundMarkers = [];
    updateUI(); draw();
}

initGame();
</script>
</body>
</html>
