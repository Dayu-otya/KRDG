const { useState, useRef, useEffect, useCallback, useReducer, useMemo } = React;

// =============================================
// スマホ縦向き検出 & 回転フック
// =============================================
function useOrientationRotation() {
  const [needsRotation, setNeedsRotation] = useState(false);

  useEffect(() => {
    const check = () => {
      // タッチデバイスかつ縦向き（幅 < 高さ）のときだけ回転
      const isTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;
      const isPortrait = window.innerWidth < window.innerHeight;
      setNeedsRotation(isTouch && isPortrait);
    };
    check();
    window.addEventListener("resize", check);
    window.addEventListener("orientationchange", check);
    return () => {
      window.removeEventListener("resize", check);
      window.removeEventListener("orientationchange", check);
    };
  }, []);

  return needsRotation;
}

const ROUNDS_MAX = 5;
const PLAYERS = 3;
const CW = 874;
const CH = 483;

const THROW_X = 115;
const FIELD_TOP = 92;
const FIELD_BOT = CH - 92;
const FIELD_MID = (FIELD_TOP + FIELD_BOT) / 2;

const LOG_CX  = 414;
const LOG_TOP = FIELD_TOP + 23;
const LOG_BOT = FIELD_BOT - 23;
const LOG_W   = 75;
const LOG_RY  = 37;

const ZONE_X     = LOG_CX + LOG_W/2 + 17;
const ZONE_RIGHT = CW - 46;
const ZONE_W     = (ZONE_RIGHT - ZONE_X) / 3;
const ZONE_TOP_Y = LOG_TOP + LOG_RY + 2;
const ZONE_BOT_Y = LOG_BOT - LOG_RY - 2;
const ZONE_H     = ZONE_BOT_Y - ZONE_TOP_Y;

const ZONE_DEFS = [
  { label:"1pt", pts:1, color:"#012169", tc:"#333" },
  { label:"2pt", pts:2, color:"#ffc72c", tc:"#333" },
  { label:"3pt", pts:3, color:"#012169", tc:"#333" },
];

const LOG_HIT_X = LOG_CX - LOG_W/2;

const PHYSICS = {
  DRAG_MAX: 120, GRAVITY: 900, DT: 0.004, GRAVITY_PER_FRAME: 3.6,
  TRAJ_STEPS: 140, BOUNCE_STEPS: 200, BOUNCE_SPEED_RATIO: 0.2,
  BOUNCE_VY_BASE: -0.35, BOUNCE_VX_BASE_RIGHT: 0.6, BOUNCE_VX_BASE_LEFT: -0.5,
  ANGLE_THRESHOLD: Math.PI / 3.5, FLOOR_Y_OFFSET: 10, FLOOR_DAMPING: 0.35,
  FLOOR_FRICTION: 0.6, MIN_VELOCITY_FLOOR: 30, MIN_VELOCITY_FRICTION: 20,
};

const THROW_PARAMS = {MIN_DRAG_LEN: 6, MIN_POWER: 0.05, THROW_DELAY_AI: 800};
const AI_DIFFICULTY = {
  HARD: {targetY:(t,b)=>t+10, powerPercent:0.53, noiseAmount:0.3, usePrediction:true},
  NORMAL: {targetY:(t,b)=>t+(b-t)*0.3, powerPercent:0.47, noiseAmount:0.6, usePrediction:true},
  EASY: {targetY:(t,b)=>(t+b)/2, powerPercent:0.36, noiseAmount:1.0, usePrediction:false},
};

const TEAM_COLOR = ["#00d4ff","#ff6b9d"];
const TEAM_BG    = ["#e0f7ff","#ffe0f0"];
const TEAM_NAME_PVP = ["チームA","チームB"];
const TEAM_NAME_AI  = ["あなた","AI"];

function playerY(idx) { return FIELD_MID; }

function dragToVelocity(dx, dy) {
  const len = Math.sqrt(dx*dx+dy*dy);
  if(len < 0.1) return {vx: 0, vy: 0, power: 0};
  const power = Math.min(len / PHYSICS.DRAG_MAX, 1.0);
  const minVx = (LOG_HIT_X - THROW_X) / (80 * PHYSICS.DT);
  const speed  = minVx / 0.1 * power * 0.95;
  return { vx:-dx/len*speed, vy:-dy/len*speed, power };
}

function simTraj(x0,y0,vx0,vy0,steps=PHYSICS.TRAJ_STEPS) {
  const pts=[];
  let x=x0,y=y0,vx=vx0,vy=vy0;
  for(let i=0;i<steps;i++){
    pts.push({x,y,vx,vy});
    vy+=PHYSICS.GRAVITY_PER_FRAME; x+=vx*PHYSICS.DT; y+=vy*PHYSICS.DT;
    if(x>CW+60||x<-60||y>CH+60) break;
  }
  return pts;
}

function checkLog(pts) {
  if(!pts || pts.length < 2) return{hit:false};
  const left=LOG_HIT_X;
  for(let i=0;i<pts.length-1;i++){
    const p=pts[i],q=pts[i+1];
    if(!p || !q) continue;
    if(p.x<=left&&q.x>=left){
      const t=(left-p.x)/((q.x-p.x)||0.001);
      const hy=p.y+t*(q.y-p.y);
      if(hy>=LOG_TOP&&hy<=LOG_BOT)
        return{hit:true,hx:left,hy,idx:i,vx:p.vx+(q.vx-p.vx)*t,vy:p.vy+(q.vy-p.vy)*t};
    }
  }
  return{hit:false};
}

function bounceFromLog(hx,hy,inVx,inVy, deterministic=false) {
  const angle=Math.atan2(Math.abs(inVy),Math.abs(inVx));
  const goRight=angle<PHYSICS.ANGLE_THRESHOLD;
  const speed=Math.sqrt(inVx*inVx+inVy*inVy);
  const baseReducedSpeed=speed*PHYSICS.BOUNCE_SPEED_RATIO*0.6;
  const randOffset=deterministic ? 0.075 : Math.random()*0.15;
  const reducedSpeed=baseReducedSpeed + speed*randOffset*0.6;
  const bvxBase=goRight? PHYSICS.BOUNCE_VX_BASE_RIGHT : PHYSICS.BOUNCE_VX_BASE_LEFT;
  const bvxRand=deterministic ? 0.15 : Math.random()*0.3;
  const bvx=goRight? reducedSpeed*(bvxBase+bvxRand)*0.65:-reducedSpeed*(bvxBase+bvxRand)*0.65;
  const bvyBase=PHYSICS.BOUNCE_VY_BASE;
  const bvyRand=deterministic ? 0.2 : Math.random()*0.4;
  const bvy=reducedSpeed*(bvyBase-bvyRand)*0.7;
  const floorY=FIELD_BOT-PHYSICS.FLOOR_Y_OFFSET;
  const pts=[];
  let x=hx+(bvx>0?3:-3),y=hy,vx=bvx,vy=bvy;
  for(let i=0;i<PHYSICS.BOUNCE_STEPS;i++){
    pts.push({x,y,vx,vy});
    vy+=PHYSICS.GRAVITY_PER_FRAME; x+=vx*PHYSICS.DT; y+=vy*PHYSICS.DT;
    if(y>=floorY){
      y=floorY; vy=-vy*PHYSICS.FLOOR_DAMPING; vx=vx*PHYSICS.FLOOR_FRICTION;
      if(Math.abs(vy)<PHYSICS.MIN_VELOCITY_FLOOR&&Math.abs(vx)<PHYSICS.MIN_VELOCITY_FRICTION){pts.push({x,y:floorY,vx:0,vy:0});break;}
    }
    if(x>CW+60||x<-60) break;
  }
  return pts;
}

function judgeLanding(pts) {
  if(!pts || pts.length === 0) return{inZone:false};
  const last=pts[pts.length-1];
  if(!last || last.y<ZONE_TOP_Y||last.y>ZONE_BOT_Y) return{inZone:false};
  for(let i=0;i<ZONE_DEFS.length;i++){
    const zx=ZONE_X+i*ZONE_W;
    if(last.x>=zx&&last.x<=zx+ZONE_W)
      return{inZone:true,zone:ZONE_DEFS[i],zoneIdx:i,lx:last.x,ly:last.y};
  }
  return{inZone:false};
}

function predictAIThrow(targetY, powerPercent) {
  const ox = THROW_X, oy = playerY(0);
  const needDy = targetY - oy;
  const dx = -PHYSICS.DRAG_MAX * powerPercent;
  const dy = PHYSICS.DRAG_MAX * powerPercent * 0.4 + (needDy * 0.1);
  const {vx, vy} = dragToVelocity(dx, dy);
  const flyPts = simTraj(ox, oy, vx, vy, 140);
  const col = checkLog(flyPts);
  if(!col.hit) return { adjustedTargetY: (LOG_TOP + LOG_BOT) / 2, confidence: 0.3 };
  const bouncePts = bounceFromLog(col.hx, col.hy, col.vx, col.vy, true);
  const landing = judgeLanding(bouncePts);
  if(landing.inZone) return { adjustedTargetY: targetY, confidence: 0.9 };
  const lastY = bouncePts[bouncePts.length - 1].y;
  if(lastY > ZONE_BOT_Y) {
    return { adjustedTargetY: Math.max(LOG_TOP, targetY - 15), confidence: 0.6 };
  } else {
    return { adjustedTargetY: Math.min(LOG_BOT, targetY + 15), confidence: 0.6 };
  }
}

function playSound(type, soundEnabled = true) {
  if (!soundEnabled) return;
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioContext.currentTime;
    if(type === "hit") {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain); gain.connect(audioContext.destination);
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
    } else if(type === "zone") {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain); gain.connect(audioContext.destination);
      osc.frequency.setValueAtTime(1000, now);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
    } else if(type === "miss") {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain); gain.connect(audioContext.destination);
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.2);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
    } else if(type === "gameEnd") {
      const audioContext2 = new (window.AudioContext || window.webkitAudioContext)();
      const now2 = audioContext2.currentTime;
      for(let i = 0; i < 3; i++) {
        const osc = audioContext2.createOscillator();
        const gain = audioContext2.createGain();
        osc.connect(gain); gain.connect(audioContext2.destination);
        const freq = [600, 800, 1000][i];
        osc.frequency.setValueAtTime(freq, now2 + i * 0.1);
        gain.gain.setValueAtTime(0.3, now2 + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.01, now2 + i * 0.1 + 0.15);
        osc.start(now2 + i * 0.1); osc.stop(now2 + i * 0.1 + 0.15);
      }
    }
  } catch(e) {}
}

function shareScore(platform, gameMode, scoreData) {
  const messages = {
    challenge: `クルドゥガでどこまでチャレンジ！\n最終スコア: ${scoreData.score}点\n最高連続成功: ${scoreData.streak}投\n#クルドゥガ\n#気にナウル`,
    realChallenge: `クルドゥガでほんとうにチャレンジ！\n最終スコア: ${scoreData.score}点\n最高連続成功: ${scoreData.streak}投\n#クルドゥガ\n#気にナウル`,
    superChallenge: `クルドゥガで超枝投げ！\n30秒で${scoreData.score}点！\n${scoreData.throws}投\n#クルドゥガ\n#気にナウル`,
    speedShot: `クルドゥガでスピードショット！\n20点獲得: ${scoreData.time}秒！\n${scoreData.throws}投\n#クルドゥガ\n#気にナウル`,
    shot10: `クルドゥガでショット10クリア！\n10秒で10点達成！\n${scoreData.throws}投\n#クルドゥガ\n#気にナウル`,
  };
  const text = messages[gameMode] || messages.challenge;
  if (platform === "twitter") {
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
  } else if (platform === "Karotter") {
    window.open(`https://karotter.com/?tab=following=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(text)}`, '_blank');
  }
}

function initGameState(gameMode = "normal", maxStreakOverride = 0, customMaxRounds = ROUNDS_MAX) {
  const baseState = { log: [] };
  if(gameMode === "challenge") {
    return { ...baseState, round:1, phase:"throwing", turn:0, playerIdx:0, score:0, streak:0, maxStreak:maxStreakOverride, gameMode:"challenge", stats: { totalThrows: 0, hitLog: 0, points: 0, zoneHits: [0, 0, 0] } };
  }
  if(gameMode === "realChallenge") {
    return { ...baseState, round:1, phase:"throwing", turn:0, playerIdx:0, score:0, streak:0, maxStreak:maxStreakOverride, gameMode:"realChallenge", stats: { totalThrows: 0, hitLog: 0, points: 0, zoneHits: [0, 0, 0] } };
  }
  if(gameMode === "superChallenge") {
    return { ...baseState, round:1, phase:"throwing", turn:0, playerIdx:0, score:0, streak:0, maxStreak:maxStreakOverride, gameMode:"superChallenge", startTime:null, stats: { totalThrows: 0, hitLog: 0, points: 0, zoneHits: [0, 0, 0] } };
  }
  if(gameMode === "speedShot") {
    return { ...baseState, round:1, phase:"throwing", turn:0, playerIdx:0, score:0, startTime:null, gameMode:"speedShot", stats: { totalThrows: 0, hitLog: 0, points: 0, zoneHits: [0, 0, 0] } };
  }
  if(gameMode === "practice") {
    return { ...baseState, round:1, phase:"throwing", turn:0, playerIdx:0, gameMode:"practice", showTrajectory: true, stats: { totalThrows: 0, hitLog: 0, points: 0, zoneHits: [0, 0, 0] } };
  }
  if(gameMode === "shot10") {
    return { ...baseState, round:1, phase:"throwing", turn:0, playerIdx:0, score:0, startTime:null, gameMode:"shot10", stats: { totalThrows: 0, hitLog: 0, points: 0, zoneHits: [0, 0, 0] } };
  }
  return { ...baseState, round:1, phase:"throwing", turn:0, playerIdx:0, scores:[Array(customMaxRounds).fill(0),Array(customMaxRounds).fill(0)], roundMarkers:[], maxRounds:customMaxRounds, gameMode:gameMode || "normal", stats: [{ totalThrows: 0, hitLog: 0, points: 0, zoneHits: [0, 0, 0] }, { totalThrows: 0, hitLog: 0, points: 0, zoneHits: [0, 0, 0] }] };
}

function updateStats(stats, result) {
  const newStats = {...stats};
  newStats.totalThrows += 1;
  if(result.hitMarutai) {
    newStats.hitLog += 1;
    if(result.inZone) {
      newStats.points += result.pts;
      newStats.zoneHits[result.zoneIdx] += 1;
    }
  }
  return newStats;
}

function determineNextTurn(state, roundMarkers) {
  const team = state.turn;
  let nextTurn = team, nextPlayerIdx = state.playerIdx, nextPhase = state.phase;
  let nextRound = state.round, nextMaxRounds = state.maxRounds;
  let newScores = state.scores.map(s => [...s]);
  let finalRM = roundMarkers;
  
  if(team === 0 && state.playerIdx < PLAYERS - 1) {
    nextPlayerIdx = state.playerIdx + 1;
  } else if(team === 0) {
    nextTurn = 1; nextPlayerIdx = 0;
  } else if(team === 1 && state.playerIdx < PLAYERS - 1) {
    nextPlayerIdx = state.playerIdx + 1;
  } else {
    const aScore = roundMarkers.filter(m => m.team === 0).reduce((s, m) => s + m.pts, 0);
    const bScore = roundMarkers.filter(m => m.team === 1).reduce((s, m) => s + m.pts, 0);
    newScores[0][state.round - 1] = aScore;
    newScores[1][state.round - 1] = bScore;
    const totalA = newScores[0].reduce((a, b) => a + b, 0);
    const totalB = newScores[1].reduce((a, b) => a + b, 0);
    if(state.round >= state.maxRounds) {
      if(totalA !== totalB) {
        nextPhase = "gameEnd";
        playSound("gameEnd", true);
      } else {
        nextMaxRounds++;
      }
    } else {
      nextPhase = "roundEnd";
    }
    finalRM = [];
    nextRound++;
    nextTurn = 0;
    nextPlayerIdx = 0;
  }
  return {nextTurn, nextPlayerIdx, nextPhase, nextRound, nextMaxRounds, newScores, finalRM};
}

function gameReducer(state, action) {
  switch(action.type) {
    case "FINISH_THROW": {
      const result = action.payload.result;
      const gameMode = state.gameMode;
      const logLine = action.payload.logLine;
      
      if(gameMode === "practice") {
        return {...state, round: state.round + 1, log: [...state.log, logLine], stats: updateStats(state.stats, result)};
      }
      if(gameMode === "challenge" || gameMode === "realChallenge") {
        const newScore = state.score + (result.inZone ? result.pts : 0);
        const isGameOver = !result.hitMarutai || (result.hitMarutai && !result.inZone);
        const newStreak = isGameOver ? 0 : state.streak + 1;
        const newMaxStreak = Math.max(state.maxStreak, newStreak);
        if(isGameOver) {
          return {...state, score: newScore, streak: 0, maxStreak: newMaxStreak, phase: "gameEnd", log: [...state.log, logLine], stats: updateStats(state.stats, result)};
        }
        return {...state, round: state.round + 1, score: newScore, streak: newStreak, maxStreak: newMaxStreak, log: [...state.log, logLine], stats: updateStats(state.stats, result)};
      }
      if(gameMode === "superChallenge") {
        const newScore = state.score + (result.inZone ? result.pts : 0);
        return {...state, round: state.round + 1, score: newScore, log: [...state.log, logLine], stats: updateStats(state.stats, result)};
      }
      if(gameMode === "speedShot") {
        const newScore = state.score + (result.inZone ? result.pts : 0);
        if(newScore >= 20) {
          return {...state, score: newScore, phase: "gameEnd", log: [...state.log, logLine], stats: updateStats(state.stats, result)};
        }
        return {...state, round: state.round + 1, score: newScore, log: [...state.log, logLine], stats: updateStats(state.stats, result)};
      }
      if(gameMode === "shot10") {
        const newScore = state.score + (result.inZone ? result.pts : 0);
        if(newScore >= 10) {
          return {...state, score: newScore, phase: "gameEnd", shot10Success: true, log: [...state.log, logLine], stats: updateStats(state.stats, result)};
        }
        return {...state, round: state.round + 1, score: newScore, log: [...state.log, logLine], stats: updateStats(state.stats, result)};
      }

      const team = state.turn;
      const newMarker = result.inZone ? {team, pts:result.pts, lx:result.lx, ly:result.ly, zoneIdx:result.zoneIdx} : null;
      const newRM = newMarker ? [...state.roundMarkers, newMarker] : state.roundMarkers;
      const newStats = [...state.stats];
      newStats[team] = updateStats(state.stats[team], result);
      const nextState = determineNextTurn(state, newRM);
      return {...state, log: [...state.log, logLine], turn: nextState.nextTurn, playerIdx: nextState.nextPlayerIdx, phase: nextState.nextPhase, round: nextState.nextRound, maxRounds: nextState.nextMaxRounds, scores: nextState.newScores, roundMarkers: nextState.finalRM, stats: newStats};
    }
    case "NEXT_ROUND":
      return {...state, phase: "throwing"};
    case "INIT_GAME":
      return initGameState(action.payload.gameMode, action.payload.maxStreakOverride, action.payload.customMaxRounds);
    case "SET_START_TIME":
      return {...state, startTime: action.payload.startTime};
    case "TIME_UP":
      return {...state, phase: "gameEnd", shot10Success: false};
    default:
      return state;
  }
}

function useScoreStorage() {
  const [scores, setScores] = useState(() => {
    try {
      if (typeof window === 'undefined') return [];
      const saved = localStorage?.getItem("kurudugaScores");
      if (!saved) return [];
      const parsed = JSON.parse(saved);
      return Array.isArray(parsed) ? parsed.filter(s => typeof s.score === 'number' && typeof s.streak === 'number' && typeof s.date === 'string') : [];
    } catch {
      return [];
    }
  });
  const saveScores = useCallback((newScores) => {
    try { 
      if (typeof window !== 'undefined' && localStorage) {
        setScores(newScores); 
        localStorage.setItem("kurudugaScores", JSON.stringify(newScores)); 
      }
    } catch (e) { console.error("Failed to save scores:", e); }
  }, []);
  const addScore = useCallback((score, streak) => {
    const newScoreRecord = { score, streak, date: new Date().toLocaleDateString('ja-JP') };
    const updatedScores = [newScoreRecord, ...scores].sort((a, b) => b.score - a.score).slice(0, 5);
    saveScores(updatedScores);
  }, [scores, saveScores]);
  const resetScores = useCallback(() => {
    try { setScores([]); if(typeof window !== 'undefined' && localStorage) localStorage.removeItem("kurudugaScores"); } catch (e) { console.error("Failed to reset scores:", e); }
  }, []);
  return { scores, saveScores, addScore, resetScores };
}

function useOverallStats() {
  const [stats, setStats] = useState(() => {
    try {
      const saved = localStorage.getItem("kurudugaOverallStats");
      if (!saved) return { totalThrows: 0, totalHits: 0, totalPoints: 0, zoneHits: [0, 0, 0], gameCount: 0 };
      const parsed = JSON.parse(saved);
      if (typeof parsed.totalThrows !== 'number' || !Array.isArray(parsed.zoneHits) || parsed.zoneHits.length !== 3) {
        return { totalThrows: 0, totalHits: 0, totalPoints: 0, zoneHits: [0, 0, 0], gameCount: 0 };
      }
      return parsed;
    } catch {
      localStorage.removeItem("kurudugaOverallStats");
      return { totalThrows: 0, totalHits: 0, totalPoints: 0, zoneHits: [0, 0, 0], gameCount: 0 };
    }
  });
  const saveStats = useCallback((newStats) => {
    try { setStats(newStats); localStorage.setItem("kurudugaOverallStats", JSON.stringify(newStats)); } catch (e) { console.error("Failed to save overall stats:", e); }
  }, []);
  const addGameStats = useCallback((gameStats) => {
    const newStats = {...stats};
    newStats.totalThrows += gameStats.totalThrows || 0;
    newStats.totalHits += gameStats.hitLog || 0;
    newStats.totalPoints += gameStats.points || 0;
    newStats.zoneHits = newStats.zoneHits.map((z, i) => z + (gameStats.zoneHits[i] || 0));
    newStats.gameCount += 1;
    saveStats(newStats);
  }, [stats, saveStats]);
  const resetStats = useCallback(() => {
    try {
      const emptyStats = { totalThrows: 0, totalHits: 0, totalPoints: 0, zoneHits: [0, 0, 0], gameCount: 0 };
      setStats(emptyStats);
      localStorage.removeItem("kurudugaOverallStats");
    } catch (e) { console.error("Failed to reset overall stats:", e); }
  }, []);
  return { stats, saveStats, addGameStats, resetStats };
}

function useRealChallengeStats() {
  const [scores, setScores] = useState(() => {
    try {
      const saved = localStorage.getItem("kurudugaRealChallengeScores");
      if (!saved) return [];
      const parsed = JSON.parse(saved);
      return Array.isArray(parsed) ? parsed.filter(s => typeof s.score === 'number' && typeof s.streak === 'number' && typeof s.date === 'string') : [];
    } catch {
      localStorage.removeItem("kurudugaRealChallengeScores");
      return [];

function drawBackground(ctx, theme) {
  const bgGrad = ctx.createLinearGradient(0, 0, 0, CH);
  if(theme === "light") {
    bgGrad.addColorStop(0, "#b8e3f0");
    bgGrad.addColorStop(0.5, "#7fd9e8");
    bgGrad.addColorStop(1, "#4bc8e0");
  } else {
    bgGrad.addColorStop(0, "#1b5174");
    bgGrad.addColorStop(0.5, "#0e92a8");
    bgGrad.addColorStop(1, "#01b8dd");
  }
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, CW, CH);
}

function drawField(ctx) {
  ctx.fillStyle = "#f5d69f";
  ctx.beginPath();
  ctx.roundRect(40, FIELD_TOP, CW-80, FIELD_BOT-FIELD_TOP, 16);
  ctx.fill();
  ctx.strokeStyle = "#daa55b";
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.strokeStyle = "#d4a76a33";
  ctx.lineWidth = 1;
  for(let i = 0; i <= 4; i++) {
    const x = 40 + (CW - 80) * (i / 4);
    ctx.beginPath();
    ctx.moveTo(x, FIELD_TOP);
    ctx.lineTo(x, FIELD_BOT);
    ctx.stroke();
  }
}

function drawZones(ctx) {
  ZONE_DEFS.forEach((z, i) => {
    const zx = ZONE_X + i * ZONE_W;
    ctx.fillStyle = z.color;
    ctx.fillRect(zx, ZONE_TOP_Y, ZONE_W, ZONE_H);
    ctx.strokeStyle = "#ffffff66";
    ctx.lineWidth = 1;
    ctx.strokeRect(zx, ZONE_TOP_Y, ZONE_W, ZONE_H);
    ctx.fillStyle = z.tc;
    ctx.font = "bold 14px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(z.label, zx + ZONE_W/2, ZONE_BOT_Y + 18);
  });
}

function drawLog(ctx) {
  const logLeft = LOG_CX - LOG_W/2, logRight = LOG_CX + LOG_W/2;
  const rxRef = LOG_W/2, ryRef = LOG_RY * 0.6;
  ctx.save();
  const logGrad = ctx.createLinearGradient(logLeft, 0, logRight, 0);
  logGrad.addColorStop(0, "#8b6f47");
  logGrad.addColorStop(0.2, "#a0826d");
  logGrad.addColorStop(0.5, "#c9a877");
  logGrad.addColorStop(0.8, "#a0826d");
  logGrad.addColorStop(1, "#8b6f47");
  ctx.fillStyle = logGrad;
  ctx.beginPath();
  ctx.moveTo(logLeft, LOG_TOP + LOG_RY);
  ctx.lineTo(logLeft, LOG_BOT - LOG_RY);
  ctx.ellipse(LOG_CX, LOG_BOT - LOG_RY, rxRef, ryRef, 0, Math.PI, 0, true);
  ctx.lineTo(logRight, LOG_TOP + LOG_RY);
  ctx.ellipse(LOG_CX, LOG_TOP + LOG_RY, rxRef, ryRef, 0, 0, Math.PI, false);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = "#6b5837";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(logLeft, LOG_TOP + LOG_RY);
  ctx.lineTo(logLeft, LOG_BOT - LOG_RY);
  ctx.ellipse(LOG_CX, LOG_BOT - LOG_RY, rxRef, ryRef, 0, Math.PI, 0, true);
  ctx.lineTo(logRight, LOG_TOP + LOG_RY);
  ctx.stroke();
  const endGrad = ctx.createRadialGradient(LOG_CX, LOG_TOP + LOG_RY, 0, LOG_CX, LOG_TOP + LOG_RY, rxRef);
  endGrad.addColorStop(0, "#e8d4b0");
  endGrad.addColorStop(0.7, "#c9a877");
  endGrad.addColorStop(1, "#8b6f47");
  ctx.beginPath();
  ctx.ellipse(LOG_CX, LOG_TOP + LOG_RY, rxRef, ryRef, 0, 0, Math.PI*2);
  ctx.fillStyle = endGrad;
  ctx.fill();
  ctx.strokeStyle = "#6b5837";
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.strokeStyle = "#7a6a5a44";
  ctx.lineWidth = 1;
  for(let r = 0.2; r < 0.9; r += 0.15) {
    ctx.beginPath();
    ctx.ellipse(LOG_CX, LOG_TOP + LOG_RY, rxRef*r, ryRef*r, 0, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawRoundMarkers(ctx, roundMarkers) {
  if(!roundMarkers || !Array.isArray(roundMarkers)) return;
  roundMarkers.forEach((m, i) => {
    if(!m || m.zoneIdx === undefined || m.ly === undefined) return;
    const zx = ZONE_X + m.zoneIdx * ZONE_W;
    const mx = zx + ZONE_W/2 + (i%2 === 0 ? -10 : 10);
    ctx.beginPath();
    ctx.arc(mx, m.ly, 9, 0, Math.PI*2);
    ctx.fillStyle = TEAM_COLOR[m.team] || "#ccc";
    ctx.fill();
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = "#fff";
    ctx.font = "bold 10px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(m.pts, mx, m.ly);
  });
}

function drawProjectile(ctx, anim) {
  if(!anim || !anim.pts || anim.idx >= anim.pts.length) return;
  const p = anim.pts[anim.idx];
  const p2 = anim.pts[Math.min(anim.idx+1, anim.pts.length-1)];
  if(!p || !p2) return;
  const angle = Math.atan2(p2.y - p.y, p2.x - p.x);
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(angle);
  ctx.fillStyle = "#a0826d";
  ctx.fillRect(-22, -4, 44, 8);
  ctx.restore();
}

function drawDragPreview(ctx, inputState, gameState, animState) {
  if(!ctx || !inputState || !gameState || animState.isThrowing) return;
  const {ox, oy, cx, cy} = inputState;
  if(ox === null || oy === null || cx === null || cy === null) return;
  const ddx = cx - ox, ddy = cy - oy, len = Math.sqrt(ddx*ddx + ddy*ddy);
  if(len <= 4) return;
  
  const clamp = Math.min(len, PHYSICS.DRAG_MAX);
  const ex = ox + ddx/len * clamp, ey = oy + ddy/len * clamp;
  ctx.strokeStyle = "#ff6b9d";
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  ctx.moveTo(ox, oy);
  ctx.lineTo(ex, ey);
  ctx.stroke();
  ctx.setLineDash([]);
  
  const {vx, vy} = dragToVelocity(ddx, ddy);
  const pts = simTraj(ox, oy, vx, vy);
  
  if(gameState.gameMode !== "realChallenge") {
    ctx.strokeStyle = TEAM_COLOR[gameState.turn] + "99";
    ctx.lineWidth = 1.5;
    ctx.setLineDash([8, 5]);
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
    ctx.setLineDash([]);
  }
  
  const col = checkLog(pts);
  if(col.hit) {
    ctx.beginPath();
    ctx.arc(col.hx, col.hy, 7, 0, Math.PI*2);
    ctx.fillStyle = "#4ade8099";
    ctx.fill();
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 1.5;
    ctx.stroke();
    if(gameState.gameMode === "practice") {
      const bouncePts = bounceFromLog(col.hx, col.hy, col.vx, col.vy, true);
      ctx.strokeStyle = "#ff6b9d";
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      bouncePts.forEach((pt, i) => {
        if(i === 0) ctx.moveTo(pt.x, pt.y);
        else ctx.lineTo(pt.x, pt.y);
      });
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  
  const pct = clamp / PHYSICS.DRAG_MAX;
  const gaugeX = 20, gaugeY = CH - 50, gaugeW = CW - 40, gaugeH = 14;
  ctx.fillStyle = "#0002";
  ctx.beginPath();
  ctx.roundRect(gaugeX, gaugeY, gaugeW, gaugeH, 7);
  ctx.fill();
  ctx.fillStyle = "#439500";
  ctx.beginPath();
  ctx.roundRect(gaugeX, gaugeY, gaugeW*pct, gaugeH, 7);
  ctx.fill();
  ctx.strokeStyle = "#ffffff99";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(gaugeX, gaugeY, gaugeW, gaugeH, 7);
  ctx.stroke();
  ctx.fillStyle = "#fff";
  ctx.font = "11px sans-serif";
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.fillText(`パワー ${Math.round(pct*100)}%`, gaugeX + 10, gaugeY + gaugeH/2);
}

function drawPlayers(ctx, gameState, animState, inputState, mode) {
  if(!gameState || gameState.phase !== "throwing" || animState.isThrowing) return;
  [0, 1, 2].forEach(i => {
    const py = playerY(i);
    const isActive = i === gameState.playerIdx;
    const r = isActive ? 23 : 16;
    ctx.beginPath();
    ctx.arc(THROW_X, py, r, 0, Math.PI*2);
    ctx.fillStyle = isActive ? TEAM_COLOR[gameState.turn] : "#e0e0e0";
    ctx.fill();
    ctx.strokeStyle = isActive ? TEAM_COLOR[gameState.turn] : "#b0b0b0";
    ctx.lineWidth = isActive ? 2 : 1.5;
    ctx.stroke();
    ctx.fillStyle = isActive ? "#fff" : "#333";
    ctx.font = `${isActive ? "bold " : ""}${isActive ? 12 : 11}px sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(`P${i+1}`, THROW_X, py);
  });
  if(!inputState.ox) {
    ctx.fillStyle = TEAM_COLOR[gameState.gameMode === "challenge" || gameState.gameMode === "realChallenge" ? 0 : gameState.turn] + "dd";
    ctx.font = "11px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("ドラッグして投げる", THROW_X, playerY(2) + 50);
  }
}
